<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>제조도 첫출근 미션수행 게임</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-user-select:none; user-select:none; }
  html,body { width:100%; height:100%; overflow:hidden; }
  body {
    font-family:'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif;
    background:#222;
  }
  #game {
    position:relative; width:100vw; height:100vh; overflow:hidden;
    cursor:pointer;
  }

  /* ---------- 배경 ---------- */
  .bg { position:absolute; inset:0; transition:background 1s; }
  .bg-title { background:linear-gradient(180deg,#0d2b66 0%,#1a4a9e 55%,#2f7fd4 100%); }
  .bg-sea   { background:linear-gradient(180deg,#dff3f0 0%,#cdeae8 60%,#b7dfe0 100%); }
  .bg-dock  { background:linear-gradient(180deg,#cfeef2 0%,#bfe7ec 55%,#a5d8c8 100%); }
  .bg-field { background:linear-gradient(180deg,#d7f0f4 0%,#c8ebef 50%,#aede84 100%); }
  .bg-office{ background:linear-gradient(180deg,#f6efe2 0%,#f1e7d3 70%,#d9c9a8 100%); }
  .bg-sunset{ background:linear-gradient(180deg,#ffd9a0 0%,#ffb385 45%,#7fc8d8 100%); }

  #scenery { position:absolute; inset:0; pointer-events:none; }
  #scenery svg { position:absolute; bottom:0; left:0; width:100%; height:100%; }

  /* ---------- 캐릭터 ---------- */
  #actor {
    position:absolute; left:50%; bottom:24vh; transform:translateX(-50%);
    width:min(34vh,300px); height:min(34vh,300px);
    display:flex; align-items:flex-end; justify-content:center;
    pointer-events:none;
  }
  #actor svg { width:100%; height:100%; filter:drop-shadow(0 10px 8px rgba(0,0,0,0.12)); }
  #actor.pop { animation:pop .45s cubic-bezier(.34,1.56,.64,1); }
  #actor.idle svg { animation:bob 2.4s ease-in-out infinite; }
  @keyframes pop { 0%{transform:translateX(-50%) scale(.4);opacity:0;} 100%{transform:translateX(-50%) scale(1);opacity:1;} }
  @keyframes bob { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-8px);} }

  /* ---------- 진행도 ---------- */
  #hud {
    position:absolute; top:16px; left:16px; right:16px;
    display:flex; align-items:center; gap:12px; pointer-events:none; z-index:30;
  }
  #hud .count { font-weight:800; font-size:22px; color:#333; background:rgba(255,255,255,.85);
    padding:4px 14px; border-radius:20px; box-shadow:0 2px 6px rgba(0,0,0,.12); }
  #hud .count b { font-size:26px; color:#2f7fd4; }
  #bar { flex:1; max-width:520px; height:22px; background:rgba(255,255,255,.9);
    border-radius:12px; box-shadow:inset 0 2px 4px rgba(0,0,0,.12); position:relative; }
  #barfill { height:100%; width:0%; background:linear-gradient(90deg,#5db4f0,#2f7fd4);
    border-radius:12px; transition:width .6s ease; }
  #boat { position:absolute; top:-14px; font-size:26px; left:0; transition:left .6s ease; transform:translateX(-50%); }

  /* ---------- 대화창 (동물의 숲 스타일) ---------- */
  #dialog {
    position:absolute; left:50%; bottom:3.5vh; transform:translateX(-50%);
    width:min(760px,94vw); min-height:150px;
    background:#fdf8e7;
    border-radius:32px;
    border:4px solid #efe3bd;
    box-shadow:0 10px 24px rgba(60,40,10,.18), inset 0 -8px 0 rgba(214,197,148,.35);
    padding:34px 34px 26px 34px;
    z-index:20;
  }
  #nametag {
    position:absolute; top:-22px; left:26px;
    background:linear-gradient(180deg,#ff9d45,#f07a2d);
    color:#fff; font-weight:800; font-size:19px;
    padding:8px 22px; border-radius:20px 20px 20px 4px;
    box-shadow:0 3px 6px rgba(0,0,0,.2);
    transform:rotate(-3deg);
  }
  #text { font-size:21px; line-height:1.65; color:#5b4a2f; font-weight:600; word-break:keep-all; min-height:70px; }
  #next {
    position:absolute; right:26px; bottom:14px; font-size:20px; color:#e0903c;
    animation:blink 1s ease-in-out infinite;
  }
  @keyframes blink { 0%,100%{transform:translateY(0);opacity:1;} 50%{transform:translateY(5px);opacity:.4;} }

  /* ---------- 선택지 ---------- */
  #choices {
    position:absolute; right:max(3vw, calc(50vw - 380px)); bottom:calc(3.5vh + 180px);
    display:flex; flex-direction:column; gap:10px; z-index:25;
  }
  .choice {
    background:#fffdf4; border:3px solid #e8d9a8; border-radius:22px;
    padding:13px 24px; font-size:18px; font-weight:700; color:#5b4a2f;
    cursor:pointer; text-align:left; box-shadow:0 4px 0 #d8c690;
    transition:transform .12s, background .12s; max-width:min(440px,80vw);
    font-family:inherit;
  }
  .choice:hover { background:#fff3c9; transform:translateY(-2px) scale(1.02); }
  .choice:active { transform:translateY(2px); box-shadow:0 1px 0 #d8c690; }

  /* ---------- 미션 클리어 스탬프 ---------- */
  #stamp-overlay {
    position:absolute; inset:0; background:rgba(30,20,5,.45);
    display:none; align-items:center; justify-content:center; z-index:50; flex-direction:column; gap:22px;
  }
  #stamp {
    width:min(320px,70vw); height:min(320px,70vw); border-radius:50%;
    border:10px double #e23b3b; color:#e23b3b; background:rgba(255,252,245,.96);
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px;
    transform:rotate(-12deg);
    animation:stampin .5s cubic-bezier(.34,1.8,.64,1);
    box-shadow:0 14px 40px rgba(0,0,0,.35);
  }
  @keyframes stampin { 0%{transform:scale(2.4) rotate(20deg);opacity:0;} 100%{transform:scale(1) rotate(-12deg);opacity:1;} }
  #stamp .big { font-size:34px; font-weight:900; letter-spacing:2px; }
  #stamp .sub { font-size:17px; font-weight:700; color:#c0392b; text-align:center; padding:0 26px; word-break:keep-all; }
  #stamp .no { font-size:15px; font-weight:800; background:#e23b3b; color:#fff; padding:3px 14px; border-radius:14px; }
  #stamp-overlay .hint { color:#fff; font-weight:700; font-size:16px; animation:blink 1.2s infinite; }

  /* ---------- 타이틀 화면 ---------- */
  #title-screen {
    position:absolute; inset:0; z-index:100;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:26px;
    background:linear-gradient(180deg,#0d2b66 0%,#1a4a9e 55%,#2f7fd4 100%);
  }
  .star { position:absolute; background:#fff; border-radius:50%; animation:tw 2.2s infinite; }
  @keyframes tw { 0%,100%{opacity:.9;} 50%{opacity:.15;} }
  #signboard {
    background:linear-gradient(180deg,#ffd66b,#f3b93f);
    border:6px solid #d99a1f; border-radius:22px;
    padding:26px 54px; text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,.4), inset 0 4px 0 rgba(255,255,255,.5);
    transform:rotate(-1deg);
  }
  #signboard .small { font-size:16px; font-weight:800; color:#7a4d05; letter-spacing:3px; margin-bottom:6px;}
  #signboard h1 { font-size:clamp(26px,5vw,44px); font-weight:900; color:#5b3a00; letter-spacing:2px; }
  #signboard .jejodo { font-weight:900; }
  #signboard .jejodo span:nth-child(1){color:#2f7fd4;} #signboard .jejodo span:nth-child(2){color:#e2903b;}
  #signboard .jejodo span:nth-child(3){color:#5a9e3d;}
  #title-screen .bubble {
    background:#fff; border-radius:18px; padding:10px 22px; font-weight:700; color:#1a3a70; font-size:17px;
    box-shadow:0 4px 12px rgba(0,0,0,.3);
  }
  #name-row { display:flex; gap:10px; align-items:center; z-index:2; }
  #pname {
    font-size:19px; padding:12px 18px; border-radius:16px; border:4px solid #f3b93f; outline:none;
    font-weight:700; color:#333; width:230px; text-align:center; font-family:inherit;
  }
  #start-btn {
    font-size:21px; font-weight:900; color:#5b3a00; background:linear-gradient(180deg,#ffe08a,#f3b93f);
    border:4px solid #d99a1f; padding:12px 34px; border-radius:20px; cursor:pointer;
    box-shadow:0 6px 0 #b57d13; transition:transform .12s; font-family:inherit;
  }
  #start-btn:hover { transform:scale(1.05); }
  #start-btn:active { transform:translateY(4px); box-shadow:0 2px 0 #b57d13; }
  #title-chars { display:flex; gap:0; align-items:flex-end; height:130px; z-index:2; }
  #title-chars svg { width:110px; height:110px; }

  /* ---------- 티켓 ---------- */
  #ticket {
    position:absolute; left:50%; top:44%; transform:translate(-50%,-50%) rotate(-2deg);
    width:min(560px,88vw); background:#e8f4f2; border-radius:20px; z-index:22;
    box-shadow:0 14px 36px rgba(0,0,0,.28); padding:26px 30px; display:none;
    border:2px solid #cfe4e1;
  }
  #ticket .tt { font-size:30px; font-weight:900; color:#243642; }
  #ticket .tno { font-size:13px; color:#6b8a95; font-weight:700; margin-left:8px;}
  #ticket .route { margin-top:8px; font-weight:800; color:#33555f; font-size:16px; border-bottom:2px solid #b9d4d0; padding-bottom:10px;}
  #ticket .info { margin-top:10px; font-size:14px; font-weight:700; color:#557079; }
  #ticket .stamp2 {
    position:absolute; right:24px; top:30px; width:110px; height:110px; border-radius:50%;
    border:5px double #e23b3b; color:#e23b3b; font-weight:900; font-size:13px;
    display:flex; flex-direction:column; align-items:center; justify-content:center; transform:rotate(14deg); gap:2px;
    opacity:.9;
  }

  /* ---------- 엔딩 카드 ---------- */
  #ending-overlay {
    position:absolute; inset:0; z-index:80; display:none;
    align-items:center; justify-content:center; flex-direction:column; gap:22px;
    background:rgba(20,14,4,.55);
  }
  #ending-overlay .grats { color:#ffe08a; font-size:clamp(24px,4.4vw,38px); font-weight:900; text-shadow:0 4px 10px rgba(0,0,0,.5);
    animation:pop2 .6s cubic-bezier(.34,1.56,.64,1); }
  @keyframes pop2 { 0%{transform:scale(.3);opacity:0;} 100%{transform:scale(1);opacity:1;} }
  #idcard {
    width:min(480px,90vw); background:#fff; border-radius:16px; padding:22px;
    display:flex; gap:18px; box-shadow:0 18px 50px rgba(0,0,0,.45);
    animation:pop2 .7s cubic-bezier(.34,1.56,.64,1);
  }
  #idcard .photo { width:120px; height:150px; background:#e8e8e8; border-radius:8px; display:flex; align-items:flex-end; justify-content:center; overflow:hidden; flex:none;}
  #idcard .photo svg { width:100px; height:135px; }
  #idcard .fields { flex:1; display:flex; flex-direction:column; gap:5px; justify-content:center;}
  #idcard .nm { font-size:24px; font-weight:900; color:#222; }
  #idcard .em { font-size:13px; color:#999; font-weight:600; margin-bottom:8px;}
  #idcard .row { font-size:14px; color:#444; font-weight:700; }
  #idcard .row b { display:inline-block; width:64px; color:#888; font-weight:700;}
  #idcard .logo { margin-top:10px; font-weight:900; font-size:18px; }
  #idcard .logo span:nth-child(1){color:#2f7fd4;} #idcard .logo span:nth-child(2){color:#e2903b;} #idcard .logo span:nth-child(3){color:#5a9e3d;}
  #replay {
    font-size:18px; font-weight:800; color:#5b3a00; background:linear-gradient(180deg,#ffe08a,#f3b93f);
    border:4px solid #d99a1f; padding:10px 28px; border-radius:18px; cursor:pointer;
    box-shadow:0 5px 0 #b57d13; font-family:inherit;
  }
  .confetti { position:absolute; width:12px; height:12px; top:-20px; z-index:79; animation:fall linear forwards; }
  @keyframes fall { to { transform:translateY(110vh) rotate(720deg); } }

  .hidden { display:none !important; }
</style>
</head>
<body>
<div id="game">
  <div class="bg bg-sea" id="bg"></div>
  <div id="scenery"></div>

  <div id="hud" class="hidden">
    <div class="count">미션 <b id="pnum">0</b>/10</div>
    <div id="bar"><div id="barfill"></div><div id="boat">⛵</div></div>
  </div>

  <div id="actor"></div>

  <div id="ticket">
    <div class="tt">호불호 티켓 <span class="tno">NO.0512</span></div>
    <div class="route">육지 ▶ 제조도</div>
    <div class="info">선박명 호불호 &nbsp;&nbsp; 등급/좌석 1층 일반석</div>
    <div class="info" id="ticket-name"></div>
    <div class="stamp2"><span>HOBULHO</span><span id="ticket-date"></span><span>JEJODO</span></div>
  </div>

  <div id="dialog" class="hidden">
    <div id="nametag">잼생이</div>
    <div id="text"></div>
    <div id="next">▼</div>
  </div>

  <div id="choices"></div>

  <div id="stamp-overlay">
    <div id="stamp">
      <div class="no" id="stamp-no">미션 1</div>
      <div class="big">클리어!</div>
      <div class="sub" id="stamp-sub"></div>
    </div>
    <div class="hint">클릭해서 계속하기</div>
  </div>

  <div id="ending-overlay">
    <div class="grats">🎉 멋진 제조도민이 되었다! 🎉</div>
    <div id="idcard">
      <div class="photo" id="id-photo"></div>
      <div class="fields">
        <div class="nm" id="id-name">제조도민</div>
        <div class="em" id="id-email">xxx@jaminlife.me</div>
        <div class="row"><b>생일</b> XXXX.XX.XX</div>
        <div class="row"><b>성별</b> 미상</div>
        <div class="row"><b>첫 입도</b> <span id="id-date"></span></div>
        <div class="logo"><span>제</span><span>조</span><span>도</span></div>
      </div>
    </div>
    <button id="replay">처음부터 다시하기</button>
  </div>

  <div id="title-screen">
    <div class="bubble">제조도에서의 첫 방향잡이 ⚓</div>
    <div id="signboard">
      <div class="small">획기획 신입도민 온보딩</div>
      <h1><span class="jejodo"><span>제</span><span>조</span><span>도</span></span> 첫출근 미션수행 게임</h1>
    </div>
    <div id="title-chars"></div>
    <div id="name-row">
      <input id="pname" maxlength="10" placeholder="이름을 입력해줘!">
      <button id="start-btn">입도하기 ⛵</button>
    </div>
  </div>
</div>
<script>
/* ==================== NPC SVG (캐릭터 시트 참고, 코드로 새로 그림) ==================== */
const SVGS = {};

/* 잼생이 — 검정 칼단발, 흰 티셔츠, 검은 바지 */

 +'</svg>';

/* 소개 — 소 인형탈을 쓴 하얀 개 (#c89a6c 몸, 흰 얼굴, 코뚜레) */

 +'<path d="M52 20 L38 8 Q28 14 36 26 Z" fill="#f3d4b8" stroke="#6a482c" stroke-width="2"/>'

 +'</svg>';

/* 그냥이 — 누워있는 삼색 고양이 */
SVGS.gnyang = '<svg viewBox="0 0 200 200">'
 +'<ellipse cx="100" cy="150" rx="76" ry="42" fill="#fdf5e9"/>'

 +'<path d="M52 126 Q58 122 64 126" stroke="#4a4444" stroke-width="2.6" fill="none" stroke-linecap="round"/>'

/* ==================== 엔진 ==================== */
const $ = id => document.getElementById(id);
let playerName = '제조도민';
let idx = -1, typing = null, typingDone = true, awaitingChoice = false, curQuizStep = null, quizSolved = false, endingShown = false;

const fill = s => s.split('{name}').join(playerName);

function setScene(scene){
  $('bg').className = 'bg bg-' + scene;
  $('scenery').innerHTML = SCENERY[scene] || '';
}
function setActor(who){
  const a = $('actor');
  a.innerHTML = SVGS[who] || '';
  a.classList.remove('pop'); void a.offsetWidth;
  a.classList.add('pop','idle');
}
const tw = { timer:null, full:'', done:null };
function typeTextD(str, done){
  clearInterval(tw.timer); typingDone = false;
  tw.full = str; tw.done = done || null;
  const el = $('text'); el.textContent = '';
  $('next').style.visibility = 'hidden';
  let i = 0;
  tw.timer = setInterval(() => {
    el.textContent = str.slice(0, ++i);
    if (i >= str.length){
      clearInterval(tw.timer); typingDone = true;
      $('next').style.visibility = 'visible';
      if (tw.done) tw.done();
    }
  }, 24);
}
function finishTyping(){
  if (typingDone) return false;
  clearInterval(tw.timer); typingDone = true;
  $('text').textContent = tw.full;
  $('next').style.visibility = 'visible';
  if (tw.done) tw.done();
  return true;
}

function showChoices(step){
  awaitingChoice = true;
  const box = $('choices'); box.innerHTML = '';
  step.choices.forEach(c => {
    const b = document.createElement('button');
    b.className = 'choice'; b.textContent = fill(c.t);
    b.onclick = e => {
      e.stopPropagation();
      box.innerHTML = ''; awaitingChoice = false;
      quizSolved = !!c.ok;
      curQuizStep = quizSolved ? null : step;
      typeTextD(fill(c.reply), null);
    };
    box.appendChild(b);
  });
}
function showStamp(step){
  $('stamp-no').textContent = '미션 ' + step.mission;
  $('stamp-sub').textContent = step.sub;
  $('pnum').textContent = step.mission;
  $('barfill').style.width = step.mission * 10 + '%';
  $('boat').style.left = step.mission * 10 + '%';
  $('stamp-overlay').style.display = 'flex';
}
function showEnding(){
  endingShown = true;
  const now = new Date();
  const pad = n => String(n).padStart(2,'0');
  $('id-name').textContent = playerName;
  $('id-date').textContent = now.getFullYear() + '.' + pad(now.getMonth()+1) + '.' + pad(now.getDate());
  $('id-photo').innerHTML = SVGS.player;
  $('ending-overlay').style.display = 'flex';
  const colors = ['#ff6b6b','#ffd93d','#6bcB77','#4d96ff','#f38bce','#ff9d45'];
  for (let i = 0; i < 90; i++){
    const c = document.createElement('div');
    c.className = 'confetti';
    c.style.left = Math.random()*100 + 'vw';
    c.style.background = colors[i % colors.length];
    c.style.animationDuration = (2.2 + Math.random()*2.5) + 's';
    c.style.animationDelay = (Math.random()*1.6) + 's';
    c.style.borderRadius = Math.random() > .5 ? '50%' : '2px';
    $('game').appendChild(c);
  }
}

function runStep(){
  const step = STEPS[idx];
  if (!step) return;
  if (step.scene) setScene(step.scene);
  if (step.who) setActor(step.who);
  if (step.name) $('nametag').textContent = step.name;
  $('ticket').style.display = step.ticket ? 'block' : 'none';

  if (step.mission){ showStamp(step); return; }
  if (step.quiz){
    curQuizStep = step; quizSolved = false;
    typeTextD(fill(step.quiz), () => showChoices(step));
    return;
  }
  typeTextD(fill(step.t), step.ending ? (() => setTimeout(showEnding, 900)) : null);
}

function advance(){
  if (endingShown || awaitingChoice) return;
  if ($('stamp-overlay').style.display === 'flex'){
    $('stamp-overlay').style.display = 'none';
    idx++; runStep(); return;
  }
  if (finishTyping()) return;
  if (curQuizStep && !quizSolved){
    typeTextD(fill(curQuizStep.quiz), () => showChoices(curQuizStep));
    return;
  }
  curQuizStep = null;
  if (STEPS[idx] && STEPS[idx].ending) return;
  idx++; runStep();
}

/* ---------- 입력 ---------- */
$('game').addEventListener('click', e => {
  if (!$('title-screen').classList.contains('hidden') && $('title-screen').style.display !== 'none') return;
  if (e.target.closest('#choices') || e.target.closest('#ending-overlay')) return;
  advance();
});
document.addEventListener('keydown', e => {
  if (e.code === 'Space' || e.code === 'Enter'){
    if ($('title-screen').style.display !== 'none'){
      if (document.activeElement === $('pname') && e.code === 'Enter'){ e.preventDefault(); startGame(); }
      return;
    }
    e.preventDefault(); advance();
  }
});

/* ---------- 시작 ---------- */
function startGame(){
  const v = $('pname').value.trim();
  playerName = v || '제조도민';
  const now = new Date();
  const pad = n => String(n).padStart(2,'0');
  $('ticket-name').textContent = '탑승자 ' + playerName + ' 님';
  $('ticket-date').textContent = '' + now.getFullYear() + pad(now.getMonth()+1) + pad(now.getDate());
  $('title-screen').style.display = 'none';
  $('hud').classList.remove('hidden');
  $('dialog').classList.remove('hidden');
  idx = 0; runStep();
}
$('start-btn').addEventListener('click', e => { e.stopPropagation(); startGame(); });
$('pname').addEventListener('click', e => e.stopPropagation());
$('replay').addEventListener('click', e => { e.stopPropagation(); location.reload(); });
$('stamp-overlay').addEventListener('click', e => { e.stopPropagation(); advance(); });

    s.style.left = Math.random()*100 + '%';
    s.style.top = Math.random()*55 + '%';
    s.style.animationDelay = Math.random()*2 + 's';
    ts.appendChild(s);
  }
