<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>제조도 첫출근 미션수행 게임</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-user-select:none; user-select:none; }
  html,body { width:100%; height:100%; overflow:hidden; }
  body { font-family:'Jua','Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif; background:#222; }
  #game { position:relative; width:100vw; height:100vh; overflow:hidden; cursor:pointer; }

  /* ---------- 하늘/배경 ---------- */
  .bg { position:absolute; inset:0; transition:background 1.2s; }
  .bg-sea   { background:linear-gradient(180deg,#ffe3c2 0%,#ffd9ae 30%,#a8dcE8 65%,#8fd0dd 100%); }
  .bg-dock  { background:linear-gradient(180deg,#aee3f5 0%,#c3ecf7 55%,#a5d8c8 100%); }
  .bg-field { background:linear-gradient(180deg,#8fd4f0 0%,#b8e6f5 50%,#aede84 100%); }
  .bg-office{ background:linear-gradient(180deg,#fdf3df 0%,#f7ecd6 70%,#e2d2b0 100%); }
  .bg-sunset{ background:linear-gradient(180deg,#ff9e7a 0%,#ffc48a 40%,#ffe0a8 60%,#7fc8d8 100%); }

  /* ---------- 해 & 구름 ---------- */
  #sun {
    position:absolute; top:7vh; right:10vw; width:92px; height:92px; border-radius:50%;
    background:radial-gradient(circle at 38% 38%, #fffbe8, #ffe680 60%, #ffd34d);
    box-shadow:0 0 60px 22px rgba(255,224,130,.55); transition:all 1.2s;
  }
  #game.sunset #sun { top:38vh; right:16vw; background:radial-gradient(circle at 38% 38%, #ffe2b8, #ff9e5e 60%, #ff7e3d); box-shadow:0 0 70px 30px rgba(255,150,80,.5); }
  #game.indoor #sun, #game.indoor #clouds { display:none; }
  .cloud { position:absolute; background:#fff; border-radius:50px; opacity:.92; animation:drift linear infinite; }
  .cloud::before, .cloud::after { content:''; position:absolute; background:#fff; border-radius:50%; }
  .c1 { width:120px; height:38px; top:9vh;  animation-duration:52s; }
  .c1::before { width:52px; height:52px; top:-24px; left:20px; }
  .c1::after  { width:38px; height:38px; top:-16px; left:62px; }
  .c2 { width:90px;  height:30px; top:20vh; animation-duration:74s; animation-delay:-30s; transform:scale(.8); }
  .c2::before { width:42px; height:42px; top:-19px; left:14px; }
  .c2::after  { width:30px; height:30px; top:-12px; left:48px; }
  .c3 { width:140px; height:42px; top:4vh;  animation-duration:95s; animation-delay:-60s; transform:scale(1.1); }
  .c3::before { width:56px; height:56px; top:-26px; left:26px; }
  .c3::after  { width:42px; height:42px; top:-18px; left:74px; }
  @keyframes drift { from { left:-180px; } to { left:105vw; } }

  #scenery { position:absolute; inset:0; pointer-events:none; }
  #scenery svg { position:absolute; bottom:0; left:0; width:100%; height:100%; }

  /* ---------- 캐릭터 ---------- */
  #actor {
    position:absolute; left:50%; bottom:24vh; transform:translateX(-50%);
    width:min(34vh,300px); height:min(34vh,300px);
    display:flex; align-items:flex-end; justify-content:center; pointer-events:none;
  }
  #actor svg { width:100%; height:100%; filter:drop-shadow(0 10px 8px rgba(0,0,0,0.12)); }
  #actor.pop { animation:pop .45s cubic-bezier(.34,1.56,.64,1); }
  #actor.idle svg { animation:bob 2.4s ease-in-out infinite; }
  @keyframes pop { 0%{transform:translateX(-50%) scale(.4);opacity:0;} 100%{transform:translateX(-50%) scale(1);opacity:1;} }
  @keyframes bob { 0%,100%{transform:translateY(0);} 50%{transform:translateY(-8px);} }

  /* ---------- 진행도 ---------- */
  #hud { position:absolute; top:16px; left:16px; right:70px; display:flex; align-items:center; gap:12px; pointer-events:none; z-index:30; }
  #hud .count { font-size:21px; color:#5b4a2f; background:rgba(255,252,240,.92); padding:5px 16px; border-radius:22px; box-shadow:0 3px 0 rgba(180,150,90,.35); border:3px solid #f0e2bb; }
  #hud .count b { font-size:25px; color:#e8913c; }
  #bar { flex:1; max-width:480px; height:24px; background:rgba(255,252,240,.92); border:3px solid #f0e2bb; border-radius:14px; box-shadow:inset 0 2px 4px rgba(0,0,0,.08); position:relative; }
  #barfill { height:100%; width:0%; background:linear-gradient(90deg,#ffd66b,#ffab4a); border-radius:10px; transition:width .6s ease; }
  #boat { position:absolute; top:-15px; font-size:27px; left:0; transition:left .6s ease; transform:translateX(-50%); }
  #sndbtn {
    position:absolute; top:14px; right:14px; z-index:35; width:44px; height:44px; border-radius:50%;
    border:3px solid #f0e2bb; background:rgba(255,252,240,.92); font-size:20px; cursor:pointer;
    box-shadow:0 3px 0 rgba(180,150,90,.35);
  }

  /* ---------- 대화창 (동물의 숲) ---------- */
  #dialog {
    position:absolute; left:50%; bottom:3.5vh; transform:translateX(-50%);
    width:min(760px,94vw); min-height:158px;
    background:linear-gradient(180deg,#fffdf2,#fdf6dd);
    border-radius:36px; border:none;
    box-shadow:0 12px 28px rgba(80,55,15,.22), inset 0 -10px 0 rgba(222,203,150,.4), inset 0 4px 0 rgba(255,255,255,.8);
    padding:36px 36px 28px 36px; z-index:20;
    animation:dialpop .35s cubic-bezier(.34,1.56,.64,1);
  }
  @keyframes dialpop { 0%{transform:translateX(-50%) scale(.85);opacity:0;} 100%{transform:translateX(-50%) scale(1);opacity:1;} }
  #dialog::before {
    content:''; position:absolute; top:-16px; left:120px;
    border:14px solid transparent; border-bottom-color:#fffdf2; border-top:none;
  }
  #nametag {
    position:absolute; top:-24px; left:26px;
    background:#f07a2d; color:#fff; font-size:20px; letter-spacing:1px;
    padding:9px 24px; border-radius:22px 22px 22px 5px;
    box-shadow:0 4px 0 rgba(0,0,0,.15), inset 0 2px 0 rgba(255,255,255,.35);
    transform:rotate(-3deg); transition:background .3s;
  }
  #text { font-size:22px; line-height:1.62; color:#5b4a2f; word-break:keep-all; min-height:72px; letter-spacing:.3px; }
  #next { position:absolute; right:28px; bottom:15px; font-size:21px; color:#e0903c; animation:blink 1s ease-in-out infinite; }
  @keyframes blink { 0%,100%{transform:translateY(0);opacity:1;} 50%{transform:translateY(5px);opacity:.4;} }

  /* ---------- 미니게임 패널 ---------- */
  #mini {
    position:absolute; left:50%; top:40%; transform:translate(-50%,-50%);
    width:min(600px,92vw); z-index:28; display:none;
    background:linear-gradient(180deg,#fffdf2,#fdf6dd);
    border-radius:30px; padding:26px 26px 20px 26px;
    box-shadow:0 16px 40px rgba(80,55,15,.3), inset 0 -8px 0 rgba(222,203,150,.4);
    animation:dialpop2 .35s cubic-bezier(.34,1.56,.64,1); cursor:default;
  }
  @keyframes dialpop2 { 0%{transform:translate(-50%,-50%) scale(.8);opacity:0;} 100%{transform:translate(-50%,-50%) scale(1);opacity:1;} }
  #mini h3 { color:#5b4a2f; font-size:21px; text-align:center; margin-bottom:16px; }
  #mini .mrow { display:flex; flex-wrap:wrap; gap:10px; justify-content:center; align-items:center; }
  #mini .msg { text-align:center; color:#c0392b; font-size:15px; min-height:24px; margin-top:12px; }
  .mbtn {
    background:#fffdf4; border:3px solid #e8d9a8; border-radius:20px;
    padding:12px 20px; font-size:17px; color:#5b4a2f; cursor:pointer;
    box-shadow:0 4px 0 #d8c690; transition:transform .12s, background .12s; font-family:inherit;
  }
  .mbtn:hover { background:#fff3c9; transform:translateY(-2px); }
  .mbtn:active { transform:translateY(2px); box-shadow:0 1px 0 #d8c690; }
  .mbtn.sel { background:#e3f5c8; border-color:#9acd5e; box-shadow:0 4px 0 #8bb954; }
  .mbtn.on  { background:#ffe9ad; border-color:#f3b93f; box-shadow:0 4px 0 #d99a1f; }
  .clockv { font-size:46px; color:#2f4a66; background:#eaf4fb; padding:6px 28px; border-radius:16px; border:3px solid #bcd8ee; min-width:170px; text-align:center; }
  .gauge { width:82%; height:20px; background:#efe8d2; border-radius:12px; margin:14px auto 0; overflow:hidden; border:2px solid #e0d3ac; }
  .gauge > div { height:100%; width:0%; background:linear-gradient(90deg,#a8e063,#7cc74c); transition:width .1s linear; }
  .slotline { background:#fff; border:3px dashed #e8d9a8; border-radius:14px; padding:14px; color:#5b4a2f; min-height:52px; text-align:center; margin-bottom:14px; font-size:18px; }
  .seatwrap { display:flex; flex-direction:column; gap:10px; align-items:center; }
  .seatrow { display:flex; gap:10px; }
  .seat { width:92px; height:52px; background:#f3e3c3; border:3px solid #d9c49a; border-radius:12px; color:#8a6a42; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:15px; box-shadow:0 3px 0 #cbb488; }
  .seat:hover { background:#ffe9b8; transform:translateY(-2px); }
  .oxbtn { width:90px; height:90px; border-radius:50%; font-size:42px; font-family:inherit; cursor:pointer; box-shadow:0 5px 0 rgba(0,0,0,.15); border:4px solid #fff; }
  .oxO { background:#5db4f0; color:#fff; } .oxX { background:#ef6c5c; color:#fff; }
  .oxbtn:active { transform:translateY(3px); box-shadow:0 1px 0 rgba(0,0,0,.15); }
  .ring { font-size:76px; text-align:center; cursor:pointer; animation:ringshake .28s infinite; }
  @keyframes ringshake { 0%,100%{transform:rotate(-10deg);} 50%{transform:rotate(10deg);} }
  .shake { animation:shake .32s; }
  @keyframes shake { 0%,100%{transform:translateX(0);} 25%{transform:translateX(-7px);} 75%{transform:translateX(7px);} }
  #mini input {
    font-size:24px; padding:10px 18px; border-radius:14px; border:3px solid #e8d9a8; outline:none;
    color:#333; width:190px; text-align:center; font-family:inherit; letter-spacing:6px;
    -webkit-user-select:text; user-select:text;
  }

  /* ---------- 스탬프 ---------- */
  #stamp-overlay { position:absolute; inset:0; background:rgba(30,20,5,.45); display:none; align-items:center; justify-content:center; z-index:50; flex-direction:column; gap:22px; }
  #stamp {
    width:min(320px,70vw); height:min(320px,70vw); border-radius:50%;
    border:10px double #e23b3b; color:#e23b3b; background:rgba(255,252,245,.96);
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px;
    transform:rotate(-12deg); animation:stampin .5s cubic-bezier(.34,1.8,.64,1); box-shadow:0 14px 40px rgba(0,0,0,.35);
  }
  @keyframes stampin { 0%{transform:scale(2.4) rotate(20deg);opacity:0;} 100%{transform:scale(1) rotate(-12deg);opacity:1;} }
  #stamp .big { font-size:36px; letter-spacing:2px; }
  #stamp .sub { font-size:17px; color:#c0392b; text-align:center; padding:0 26px; word-break:keep-all; }
  #stamp .no { font-size:15px; background:#e23b3b; color:#fff; padding:3px 16px; border-radius:14px; }
  #stamp-overlay .hint { color:#fff; font-size:16px; animation:blink 1.2s infinite; }

  /* ---------- 티켓 ---------- */
  #ticket {
    position:absolute; left:50%; top:42%; transform:translate(-50%,-50%) rotate(-2deg);
    width:min(560px,88vw); background:#e8f4f2; border-radius:20px; z-index:22;
    box-shadow:0 14px 36px rgba(0,0,0,.28); padding:26px 30px; display:none; border:2px solid #cfe4e1;
  }
  #ticket .tt { font-size:30px; color:#243642; }
  #ticket .tno { font-size:13px; color:#6b8a95; margin-left:8px; }
  #ticket .route { margin-top:8px; color:#33555f; font-size:16px; border-bottom:2px solid #b9d4d0; padding-bottom:10px; }
  #ticket .info { margin-top:10px; font-size:14px; color:#557079; }
  #ticket .stamp2 {
    position:absolute; right:24px; top:30px; width:110px; height:110px; border-radius:50%;
    border:5px double #e23b3b; color:#e23b3b; font-size:13px;
    display:flex; flex-direction:column; align-items:center; justify-content:center; transform:rotate(14deg); gap:2px; opacity:.9;
  }

  /* ---------- 타이틀 ---------- */
  #title-screen {
    position:absolute; inset:0; z-index:100;
    display:flex; flex-direction:column; align-items:center; justify-content:center; gap:24px;
    background:linear-gradient(180deg,#0d2b66 0%,#1a4a9e 50%,#2f7fd4 78%, #74b95e 78.2%, #5a9e3d 100%);
  }
  .star { position:absolute; background:#fff; border-radius:50%; animation:tw 2.2s infinite; }
  @keyframes tw { 0%,100%{opacity:.9;} 50%{opacity:.15;} }
  #signboard {
    background:linear-gradient(180deg,#ffd66b,#f3b93f); border:6px solid #d99a1f; border-radius:26px;
    padding:26px 54px; text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,.4), inset 0 4px 0 rgba(255,255,255,.5);
    transform:rotate(-1.5deg); animation:swing 3.4s ease-in-out infinite;
  }
  @keyframes swing { 0%,100%{transform:rotate(-1.5deg);} 50%{transform:rotate(1.2deg);} }
  #signboard .small { font-size:16px; color:#7a4d05; letter-spacing:3px; margin-bottom:6px; }
  #signboard h1 { font-size:clamp(26px,5vw,44px); color:#5b3a00; letter-spacing:2px; }
  #signboard .jejodo span:nth-child(1){color:#2f7fd4;} #signboard .jejodo span:nth-child(2){color:#e2903b;} #signboard .jejodo span:nth-child(3){color:#5a9e3d;}
  #title-screen .bubble { background:#fff; border-radius:20px; padding:10px 24px; color:#1a3a70; font-size:17px; box-shadow:0 4px 12px rgba(0,0,0,.3); }
  #name-row { display:flex; gap:10px; align-items:center; z-index:2; }
  #pname {
    font-size:19px; padding:12px 18px; border-radius:18px; border:4px solid #f3b93f; outline:none;
    color:#333; width:230px; text-align:center; font-family:inherit; -webkit-user-select:text; user-select:text;
  }
  #start-btn {
    font-size:21px; color:#5b3a00; background:linear-gradient(180deg,#ffe08a,#f3b93f);
    border:4px solid #d99a1f; padding:12px 34px; border-radius:22px; cursor:pointer;
    box-shadow:0 6px 0 #b57d13; transition:transform .12s; font-family:inherit;
  }
  #start-btn:hover { transform:scale(1.06) rotate(-1deg); }
  #start-btn:active { transform:translateY(4px); box-shadow:0 2px 0 #b57d13; }
  #title-chars { display:flex; gap:2px; align-items:flex-end; height:130px; z-index:2; }
  #title-chars svg { width:108px; height:108px; }
  #title-chars > svg { animation:bob 2.2s ease-in-out infinite; }
  #title-chars > svg:nth-child(2n) { animation-delay:.4s; }
  #title-chars > svg:nth-child(3n) { animation-delay:.8s; }

  /* ---------- 엔딩 ---------- */
  #ending-overlay {
    position:absolute; inset:0; z-index:80; display:none;
    align-items:center; justify-content:center; flex-direction:column; gap:22px; background:rgba(20,14,4,.55);
  }
  #ending-overlay .grats { color:#ffe08a; font-size:clamp(24px,4.4vw,38px); text-shadow:0 4px 10px rgba(0,0,0,.5); animation:pop2 .6s cubic-bezier(.34,1.56,.64,1); }
  @keyframes pop2 { 0%{transform:scale(.3);opacity:0;} 100%{transform:scale(1);opacity:1;} }
  #idcard { width:min(480px,90vw); background:#fff; border-radius:18px; padding:22px; display:flex; gap:18px; box-shadow:0 18px 50px rgba(0,0,0,.45); animation:pop2 .7s cubic-bezier(.34,1.56,.64,1); }
  #idcard .photo { width:120px; height:150px; background:#dff0f7; border-radius:10px; display:flex; align-items:flex-end; justify-content:center; overflow:hidden; flex:none; }
  #idcard .photo svg { width:100px; height:135px; }
  #idcard .fields { flex:1; display:flex; flex-direction:column; gap:5px; justify-content:center; }
  #idcard .nm { font-size:25px; color:#222; }
  #idcard .em { font-size:13px; color:#999; margin-bottom:8px; }
  #idcard .row { font-size:14px; color:#444; }
  #idcard .row b { display:inline-block; width:64px; color:#999; font-weight:400; }
  #idcard .logo { margin-top:10px; font-size:19px; }
  #idcard .logo span:nth-child(1){color:#2f7fd4;} #idcard .logo span:nth-child(2){color:#e2903b;} #idcard .logo span:nth-child(3){color:#5a9e3d;}
  #replay {
    font-size:18px; color:#5b3a00; background:linear-gradient(180deg,#ffe08a,#f3b93f);
    border:4px solid #d99a1f; padding:10px 28px; border-radius:20px; cursor:pointer; box-shadow:0 5px 0 #b57d13; font-family:inherit;
  }
  .confetti { position:absolute; width:12px; height:12px; top:-20px; z-index:79; animation:fall linear forwards; }
  @keyframes fall { to { transform:translateY(110vh) rotate(720deg); } }

  .hidden { display:none !important; }
</style>
</head>
<body>
<div id="game">
  <div class="bg bg-sea" id="bg"></div>
  <div id="sun"></div>
  <div id="clouds"><div class="cloud c1"></div><div class="cloud c2"></div><div class="cloud c3"></div></div>
  <div id="scenery"></div>

  <div id="hud" class="hidden">
    <div class="count">미션 <b id="pnum">0</b>/10</div>
    <div id="bar"><div id="barfill"></div><div id="boat">⛵</div></div>
  </div>
  <button id="sndbtn" class="hidden">🔊</button>

  <div id="actor"></div>

  <div id="ticket">
    <div class="tt">호불호 티켓 <span class="tno">NO.0512</span></div>
    <div class="route">육지 ▶ 제조도</div>
    <div class="info">선박명 호불호 &nbsp;&nbsp; 등급/좌석 1층 일반석</div>
    <div class="info" id="ticket-name"></div>
    <div class="stamp2"><span>HOBULHO</span><span id="ticket-date"></span><span>JEJODO</span></div>
  </div>

  <div id="dialog" class="hidden">
    <div id="nametag">잼생이</div>
    <div id="text"></div>
    <div id="next">▼</div>
  </div>

  <div id="mini"></div>

  <div id="stamp-overlay">
    <div id="stamp">
      <div class="no" id="stamp-no">미션 1</div>
      <div class="big">클리어!</div>
      <div class="sub" id="stamp-sub"></div>
    </div>
    <div class="hint">클릭해서 계속하기</div>
  </div>

  <div id="ending-overlay">
    <div class="grats">🎉 멋진 제조도민이 되었다! 🎉</div>
    <div id="idcard">
      <div class="photo" id="id-photo"></div>
      <div class="fields">
        <div class="nm" id="id-name">제조도민</div>
        <div class="em" id="id-email">xxx@jaminlife.me</div>
        <div class="row"><b>생일</b> XXXX.XX.XX</div>
        <div class="row"><b>성별</b> 미상</div>
        <div class="row"><b>첫 입도</b> <span id="id-date"></span></div>
        <div class="logo"><span>제</span><span>조</span><span>도</span></div>
      </div>
    </div>
    <button id="replay">처음부터 다시하기</button>
  </div>

  <div id="title-screen">
    <div class="bubble">제조도에서의 첫 하루가 시작된다! 🌅</div>
    <div id="signboard">
      <div class="small">획기획 신입도민 온보딩</div>
      <h1><span class="jejodo"><span>제</span><span>조</span><span>도</span></span> 첫출근 미션수행 게임</h1>
    </div>
    <div id="title-chars"></div>
    <div id="name-row">
      <input id="pname" maxlength="10" placeholder="이름을 입력해줘!">
      <button id="start-btn">입도하기 ⛵</button>
    </div>
  </div>
</div>
<script>
/* ==================== NPC SVG (캐릭터 시트 참고, 코드로 새로 그림) ==================== */
const SVGS = {};

/* 잼생이 — 검정 칼단발, 흰 티셔츠, 검은 바지 */
SVGS.jam = '<svg viewBox="0 0 200 200">'
 +'<path d="M60 18 Q100 2 140 18 Q152 30 150 78 L138 92 L62 92 L50 78 Q48 30 60 18Z" fill="#1c1c1c"/>'
 +'<path d="M72 40 Q100 30 128 40 L128 74 Q100 86 72 74Z" fill="#fff"/>'
 +'<circle cx="86" cy="56" r="3.6" fill="#1c1c1c"/><circle cx="114" cy="56" r="3.6" fill="#1c1c1c"/>'
 +'<path d="M95 68 Q100 72 105 68" stroke="#1c1c1c" stroke-width="2.4" fill="none" stroke-linecap="round"/>'
 +'<path d="M62 92 L138 92 L136 100 L64 100Z" fill="#1c1c1c"/>'
 +'<path d="M64 100 Q100 94 136 100 L142 146 Q100 154 58 146Z" fill="#fdfdfd" stroke="#e2e2e2" stroke-width="2"/>'
 +'<rect x="70" y="144" width="26" height="40" rx="8" fill="#202020"/>'

/* ==================== 사운드 (동물의 숲st 말소리) ==================== */
let sndOn = true, actx = null, curPitch = 380;
function beep(freq, dur, type, vol){
  if (!sndOn) return;
  try {
    if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
    const o = actx.createOscillator(), g = actx.createGain();
    o.type = type || 'square'; o.frequency.value = freq;
    g.gain.value = vol || .04;
    g.gain.exponentialRampToValueAtTime(.0001, actx.currentTime + (dur || .05));
    o.connect(g); g.connect(actx.destination);
    o.start(); o.stop(actx.currentTime + (dur || .05));
  } catch(e){}
}
const talkBlip = () => beep(curPitch + Math.random()*80 - 40, .045, 'square', .03);
const dingOK   = () => { beep(660,.09,'sine',.08); setTimeout(()=>beep(880,.14,'sine',.08), 90); };
const buzzNO   = () => beep(140,.18,'sawtooth',.06);
const thunk    = () => beep(90,.16,'sine',.14);

function setScene(scene){
  $('bg').className = 'bg bg-' + scene;
  $('scenery').innerHTML = SCENERY[scene] || '';

  a.classList.remove('pop'); void a.offsetWidth;
  a.classList.add('pop','idle');
}
function setName(name){
  $('nametag').textContent = name;
  const c = CHAR[name];
  if (c){ $('nametag').style.background = c.color; curPitch = c.pitch; }
}
function typeTextD(str, done){
  clearInterval(tw.timer); typingDone = false;
  tw.full = str; tw.done = done || null;
  const el = $('text'); el.textContent = '';
  $('next').style.visibility = 'hidden';
  let i = 0;
  tw.timer = setInterval(() => {
    el.textContent = str.slice(0, ++i);
    if (i % 2 === 0) talkBlip();
    if (i >= str.length){
      clearInterval(tw.timer); typingDone = true;
      $('next').style.visibility = 'visible';
      if (tw.done) tw.done();
    }
  }, 24);
}
function finishTyping(){
  if (typingDone) return false;
  clearInterval(tw.timer); typingDone = true;
  $('text').textContent = tw.full;
  $('next').style.visibility = 'visible';
  if (tw.done) tw.done();
  return true;
}

/* ==================== 미니게임 ==================== */
function miniOpen(title, html){
  const m = $('mini');
  m.innerHTML = '<h3>' + title + '</h3>' + html + '<div class="msg" id="mmsg"></div>';
  m.style.display = 'block';
  miniActive = true;
  return m;
}
function miniMsg(t){ const e = $('mmsg'); e.textContent = t; buzzNO(); const m = $('mini'); m.classList.remove('shake'); void m.offsetWidth; m.classList.add('shake'); }
function miniDone(){
  dingOK();
  setTimeout(() => {
    $('mini').style.display = 'none';
    miniActive = false;
    idx++; runStep();
  }, 350);
}

    const wrong = sel.some(i => !items[i].ok);
    const allOk = items.every((it,i) => !it.ok || sel.includes(i));
    if (wrong) return miniMsg('짹! 그건 제조도에서 안 받는 거야~ 다시 골라봐!');
    if (!allOk) return miniMsg('짹짹! 아직 안 담은 게 있어! 4가지를 전부 담아줘!');
    miniDone();
  };
};

/* 6. 메일 제목 조립 */
MINI.mail = () => {
  const order = ['[클라이언트명]','프로젝트명','/ 내용(요청·기한)'];
  const shuffled = ['프로젝트명','/ 내용(요청·기한)','[클라이언트명]'];
  let step = 0;
  miniOpen('📧 순서대로 눌러서 메일 제목을 완성해봐!',
    '<div class="slotline" id="mslot">□ □ □</div>'
    + '<div class="mrow">' + shuffled.map(p => '<button class="mbtn mp" data-p="' + p + '">' + p + '</button>').join('') + '</div>');
  const upd = () => {
    $('mslot').textContent = step === 0 ? '□ □ □' : order.slice(0, step).join(' ') + (step < 3 ? ' □'.repeat(3-step) : ' ✨');
  };
  $('mini').querySelectorAll('.mp').forEach(b => {
    b.onclick = () => {
      if (b.disabled) return;
      if (b.dataset.p === order[step]){
        step++; b.disabled = true; b.style.opacity = .35; beep(600 + step*80,.07);
        upd();
        if (step === 3) miniDone();
      } else {
        step = 0;
        $('mini').querySelectorAll('.mp').forEach(x => { x.disabled = false; x.style.opacity = 1; });
        upd();
        miniMsg('순서가 달라~ 클라이언트명이 제일 먼저야! 처음부터!');
      }
    };
  });
};

/* 7. 전화 받기 */
MINI.phone = () => {

  const ringIv = setInterval(() => beep(880,.07,'sine',.05), 700);
  $('mring').onclick = () => { clearInterval(ringIv); phase2(); };

  function phase2(){
    const opts = [
      {t:'"여보세요…?"', ok:false, m:'땡!! 어디에 건지 모르잖아!! 다시!!'},

    ];

      '<div class="mrow" style="flex-direction:column;">' + opts.map((o,i) => '<button class="mbtn" data-i="' + i + '">' + fill(o.t) + '</button>').join('') + '</div>');
    $('mini').querySelectorAll('.mbtn').forEach(b => {
      b.onclick = () => {
        const o = opts[+b.dataset.i];
        if (o.ok){ beep(700,.1,'sine',.07); phase3(); }
        else miniMsg(o.m);
      };
    });
  }
  function phase3(){
    const memo = ['성함','회사','연락처','용건','기한'];
    let got = 0;
    miniOpen('📝 통화하면서 필수 메모 5가지를 체크!',
      '<div class="mrow">' + memo.map(m => '<button class="mbtn mm">' + m + '</button>').join('') + '</div>');
    $('mini').querySelectorAll('.mm').forEach(b => {
      b.onclick = () => {
        if (b.classList.contains('sel')) return;
        b.classList.add('sel'); b.textContent = '✔ ' + b.textContent; beep(560 + got*60,.06);
        if (++got === 5) miniDone();
      };
    });
  }
};

/* 8·9. OX 퀴즈 */
function oxGame(title, qs){
  let i = 0;
  const m = miniOpen(title,
    '<div class="slotline" id="mq"></div>'
    + '<div class="mrow"><button class="oxbtn oxO" id="mo">O</button><button class="oxbtn oxX" id="mx">X</button></div>');
  const show = () => { $('mq').textContent = '[' + (i+1) + '/' + qs.length + '] ' + qs[i].q; };
  const pick = v => {
    if (v === qs[i].a){
      beep(700,.08,'sine',.07);
      i++;
      if (i === qs.length) miniDone(); else { show(); $('mmsg').textContent = '정답! 다음~'; $('mmsg').style.color = '#4a9e5c'; }
    } else miniMsg(qs[i].hint);
  };
  $('mo').onclick = () => pick(true);
  $('mx').onclick = () => pick(false);
  show();
}

/* ==================== 진행 엔진 ==================== */
function runStep(){
  const step = STEPS[idx];
  if (!step) return;
  if (step.scene) setScene(step.scene);
  if (step.who) setActor(step.who);
  if (step.name) setName(step.name);
  $('ticket').style.display = step.ticket ? 'block' : 'none';

  if (step.mission){ showStamp(step); return; }
  if (step.mini){
    let opened = false;
    typeTextD(fill(step.t), () => { if (!opened){ opened = true; setTimeout(() => MINI[step.mini](), 420); } });
    return;
  }
  typeTextD(fill(step.t), step.ending ? (() => setTimeout(showEnding, 900)) : null);
}
function showStamp(step){
  thunk();
  $('stamp-no').textContent = '미션 ' + step.mission;
  $('stamp-sub').textContent = step.sub;
  $('pnum').textContent = step.mission;
  $('barfill').style.width = step.mission * 10 + '%';
  $('boat').style.left = step.mission * 10 + '%';
  $('stamp-overlay').style.display = 'flex';
}
function showEnding(){
  endingShown = true;
  const now = new Date();
  const pad = n => String(n).padStart(2,'0');
  $('id-name').textContent = playerName;
  $('id-date').textContent = now.getFullYear() + '.' + pad(now.getMonth()+1) + '.' + pad(now.getDate());
  $('id-photo').innerHTML = SVGS.player;
  $('ending-overlay').style.display = 'flex';
  dingOK(); setTimeout(dingOK, 400);
  const colors = ['#ff6b6b','#ffd93d','#6bcb77','#4d96ff','#f38bce','#ff9d45'];
  for (let i = 0; i < 90; i++){
    const c = document.createElement('div');
    c.className = 'confetti';
    c.style.left = Math.random()*100 + 'vw';
    c.style.background = colors[i % colors.length];
    c.style.animationDuration = (2.2 + Math.random()*2.5) + 's';
    c.style.animationDelay = (Math.random()*1.6) + 's';
    c.style.borderRadius = Math.random() > .5 ? '50%' : '2px';
    $('game').appendChild(c);
  }
}
function advance(){
  if (endingShown || miniActive) return;
  if ($('stamp-overlay').style.display === 'flex'){
    $('stamp-overlay').style.display = 'none';
    idx++; runStep(); return;
  }
  if (finishTyping()) return;
  if (STEPS[idx] && (STEPS[idx].ending || STEPS[idx].mini)) return;
  idx++; runStep();
}

/* ==================== 입력 ==================== */
$('game').addEventListener('click', e => {
  if ($('title-screen').style.display !== 'none') return;
  if (e.target.closest('#mini') || e.target.closest('#ending-overlay') || e.target.closest('#sndbtn')) return;
  advance();
});
document.addEventListener('keydown', e => {
  if (document.activeElement && document.activeElement.tagName === 'INPUT'){
    if ($('title-screen').style.display !== 'none' && e.code === 'Enter'){ e.preventDefault(); startGame(); }
    return;
  }
  if (e.code === 'Space' || e.code === 'Enter'){
    if ($('title-screen').style.display !== 'none') return;
    e.preventDefault(); advance();
  }
});
$('stamp-overlay').addEventListener('click', e => { e.stopPropagation(); advance(); });
$('replay').addEventListener('click', e => { e.stopPropagation(); location.reload(); });
$('sndbtn').addEventListener('click', e => {
  e.stopPropagation();
  sndOn = !sndOn;
  $('sndbtn').textContent = sndOn ? '🔊' : '🔇';
});

/* ==================== 시작 ==================== */
function startGame(){
  const v = $('pname').value.trim();
  playerName = v || '제조도민';
  const now = new Date();
  const pad = n => String(n).padStart(2,'0');
  $('ticket-name').textContent = '탑승자 ' + playerName + ' 님';
  $('ticket-date').textContent = '' + now.getFullYear() + pad(now.getMonth()+1) + pad(now.getDate());
  $('title-screen').style.display = 'none';
  $('hud').classList.remove('hidden');
  $('sndbtn').classList.remove('hidden');
  $('dialog').classList.remove('hidden');
  idx = 0; runStep();
}
$('start-btn').addEventListener('click', e => { e.stopPropagation(); startGame(); });
$('pname').addEventListener('click', e => e.stopPropagation());
